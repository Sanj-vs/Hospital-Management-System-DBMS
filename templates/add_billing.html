{% extends 'base.html' %}
{% block page_title %}Add Bill{% endblock %}
{% block page_subtitle %}Generate a new bill{% endblock %}
{% block content %}
<div class="page-header">
  <div><h4>Add New Bill</h4><p>Only completed appointments</p></div>
  <a href="{{ url_for('billing') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Back</a>
</div>
<div class="form-card" style="max-width:560px;">
  <form method="POST">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Select Completed Appointment *</label>
        <select name="appt_id" class="form-select" required onchange="setPatient(this)">
          <option value="">-- Choose Appointment --</option>
          {% for a in appointments %}
          <option value="{{ a.appt_id }}" data-patient="{{ a.patient_id }}">
            #{{ a.appt_id }} — {{ a.patient_name }} with {{ a.doctor_name }} on {{ a.appt_date }}
          </option>
          {% endfor %}
        </select>
      </div>
      <input type="hidden" name="patient_id" id="patient_id">
      <div class="col-md-6">
        <label class="form-label">Amount (₹) *</label>
        <input type="number" name="amount" class="form-control" step="0.01" min="0" placeholder="e.g. 800.00" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control" placeholder="e.g. Consultation fee">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary"><i class="fas fa-file-invoice-dollar me-2"></i>Generate Bill</button>
      </div>
    </div>
  </form>
</div>
<script>
function setPatient(sel) {
  document.getElementById('patient_id').value = sel.options[sel.selectedIndex].dataset.patient || '';
}
</script>
{% endblock %}
